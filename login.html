<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Same styles as before -->
    <title>Login | Vertex PCMT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Your existing styles here -->
</head>
<body>
    <!-- Same HTML structure -->
    <div class="auth-container">
        <div class="logo"><!-- Logo --></div>
        
        <div id="loginForm">
            <form id="loginFormElement">
                <!-- Email/Password fields -->
                <button type="submit" class="login-btn">Login</button>
            </form>
            <button class="google-btn" id="googleLoginBtn">Continue with Google</button>
        </div>
        
        <div id="loading" style="display:none;text-align:center;padding:2rem;">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#00d4ff;"></i>
            <p>Signing in...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            // YOUR CONFIG HERE
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Login with Email/Password
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showLoading();
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('❌ Login failed: ' + error.message);
            }
            hideLoading();
        });

        // Google Login
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            showLoading();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('❌ Google login failed: ' + error.message);
            }
            hideLoading();
        });

        function showLoading() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
