<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Vertex PCMT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0c0c1a 0%,#1a1a2e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;color:#fff;}
        .auth-container{max-width:500px;width:100%;background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));backdrop-filter:blur(30px);border-radius:25px;padding:3rem;border:1px solid rgba(255,255,255,0.2);box-shadow:0 25px 50px rgba(0,0,0,0.5);}
        .logo{text-align:center;margin-bottom:2.5rem;}
        .logo i{font-size:4rem;color:#00d4ff;margin-bottom:1rem;display:block;}
        .logo h1{font-size:2.2rem;font-weight:800;background:linear-gradient(45deg,#00d4ff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .form-group{position:relative;margin-bottom:1.8rem;}
        .form-group input{width:100%;padding:18px 20px 18px 50px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:15px;color:#fff;font-size:1.1rem;transition:all 0.3s;}
        .form-group input::placeholder{color:rgba(255,255,255,0.6);}
        .form-group input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 20px rgba(0,212,255,0.3);background:rgba(255,255,255,0.15);}
        .form-group i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#00d4ff;font-size:1.2rem;}
        .register-btn{width:100%;padding:20px;background:linear-gradient(45deg,#00d4ff,#00aaff);color:#fff;border:none;border-radius:15px;font-size:1.3rem;font-weight:700;cursor:pointer;transition:all 0.4s;text-transform:uppercase;letter-spacing:1px;margin-bottom:1.5rem;}
        .register-btn:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(0,212,255,0.5);}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:1rem;width:100%;padding:16px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);border-radius:15px;font-size:1.1rem;cursor:pointer;transition:all 0.3s;}
        .google-btn:hover{background:rgba(255,255,255,0.15);border-color:#00d4ff;transform:translateY(-2px);}
        .login-link{text-align:center;margin-top:2rem;}
        .login-link a{color:#00d4ff;text-decoration:none;font-weight:600;transition:color 0.3s;}
        .login-link a:hover{color:#fff;}
        .success-message{display:none;background:linear-gradient(45deg,#00d4ff,#00aaff);color:#fff;padding:1.5rem;border-radius:15px;margin:1.5rem 0;text-align:center;font-weight:600;}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
            <h1>Vertex PCMT</h1>
            <p style="color:rgba(255,255,255,0.7);">Create Account</p>
        </div>
        
        <div id="registerForm">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullname" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password (min 6 chars)" minlength="6" required>
                </div>
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="divider" style="text-align:center;margin:2rem 0;color:rgba(255,255,255,0.6);position:relative;">
                <span style="background:rgba(26,26,46,0.8);padding:0 1rem;">or</span>
            </div>
            
            <button class="google-btn" onclick="googleRegister()">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
        </div>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle" style="font-size:2rem;margin-bottom:1rem;"></i>
            Account created! Please log in.
        </div>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Log in here</a>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (password.length < 6) {
                alert('❌ Password must be at least 6 characters!');
                return;
            }
            
            // Demo registration
            showSuccess();
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
        
        function googleRegister() {
            alert('🔄 Google registration coming soon!');
        }
        
        function showSuccess() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>
</body>
</html>
